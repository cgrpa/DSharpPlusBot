
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
        - name: 'Checkout'
          uses: actions/checkout@v4
          
        - name: 'Setup .NET'
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '9.0.x'
            
        - name: 'Restore dependencies'
          run: dotnet restore
          
        - name: 'Build'
          run: dotnet build --no-restore
          
        - name: 'Test'
          run: dotnet test --no-build --verbosity normal --filter "Category!=Integration"

    build-and-deploy:
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
        # checkout the repo
        - name: 'Checkout GitHub Action'
          uses: actions/checkout@v4
          
        - name: 'Login via Azure CLI'
          uses: azure/login@v1
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
        
        - name: 'Build and push image'
          uses: azure/docker-login@v1
          with:
            login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
            username: ${{ secrets.REGISTRY_USERNAME }}
            password: ${{ secrets.REGISTRY_PASSWORD }}
        - run: |
            docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:${{ github.sha }}
            docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:latest
            docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:${{ github.sha }}
            docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:latest
