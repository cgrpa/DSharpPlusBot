
name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        
      - name: 'Login via Azure CLI'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: 'Build and push image'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
          
      - run: |
          docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:${{ github.sha }}
          docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:latest
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:latest
      
      - name: 'Update Container App'
        run: |
          echo "Verifying Azure CLI authentication..."
          az account show --output table
          
          echo "Updating Container App with new image..."
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP_NAME }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/thesexy6bot:${{ github.sha }} \
            --output table || {
              echo "ERROR: Failed to update Container App."
              echo "Please verify that:"
              echo "  1. CONTAINER_APP_NAME secret is set to the correct Container App name"
              echo "  2. RESOURCE_GROUP_NAME secret is set to the correct resource group"
              echo "  3. The service principal has 'Contributor' or 'Container Apps Contributor' role"
              echo "  4. The Container App exists and is accessible"
              exit 1
            }
          
          echo "Container App updated successfully. New revision created with image tag: ${{ github.sha }}"
