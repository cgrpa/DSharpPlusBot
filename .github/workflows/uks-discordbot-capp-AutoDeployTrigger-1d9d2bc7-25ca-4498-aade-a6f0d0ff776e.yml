name: Trigger auto deployment for uks-discordbot-capp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/uks-discordbot-capp-AutoDeployTrigger-1d9d2bc7-25ca-4498-aade-a6f0d0ff776e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: prduksdiscordbotacr-b3gugmegdbdefcas.azurecr.io
          registryUsername: ${{ secrets.UKSDISCORDBOTCAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.UKSDISCORDBOTCAPP_REGISTRY_PASSWORD }}
          containerAppName: uks-discordbot-capp
          resourceGroup: uks-discordbot-rg
          imageToBuild: prduksdiscordbotacr-b3gugmegdbdefcas.azurecr.io/uks-discordbot-capp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


