name: Trigger auto deployment for uks-discordbot-capp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore TheSexy6BotWorker.sln

      - name: Build
        run: dotnet build TheSexy6BotWorker.sln --no-restore

      - name: Test
        run: dotnet test TheSexy6BotWorker.sln --no-build --verbosity normal --filter "Category!=Integration"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit info
        id: commit
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.UKSDISCORDBOTCAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          registryUsername: ${{ secrets.UKSDISCORDBOTCAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.UKSDISCORDBOTCAPP_REGISTRY_PASSWORD }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ secrets.AZURE_CONTAINER_APP_NAME }}:${{ github.sha }}
          buildArguments: GIT_SHA="${{ steps.commit.outputs.sha }}" GIT_COMMIT_MSG="${{ steps.commit.outputs.msg }}"


