name: Reusable .NET Test

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version to install.
        required: false
        type: string
        default: 9.0.x
      solution:
        description: Solution file to restore, build, and test.
        required: false
        type: string
        default: TheSexy6BotWorker.slnx
      test-filter:
        description: Test filter passed to dotnet test.
        required: false
        type: string
        default: Category!=Integration

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore "${{ inputs.solution }}"

      - name: Build
        run: dotnet build "${{ inputs.solution }}" --no-restore

      - name: Test
        run: dotnet test "${{ inputs.solution }}" --no-build --verbosity normal --filter "${{ inputs.test-filter }}"
