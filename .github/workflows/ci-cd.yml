name: Trigger auto deployment for uks-discordbot-capp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            terraform:
              - 'src/terraform/**'
            dotnet:
              - 'src/dotnet/**'

  test-dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
        
      - name: 'Setup .NET'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '9.0.x'
          
      - name: 'Restore dependencies'
        run: dotnet restore TheSexy6BotWorker.slnx
        
      - name: 'Build'
        run: dotnet build TheSexy6BotWorker.slnx --no-restore
        
      - name: 'Test'
        run: dotnet test TheSexy6BotWorker.slnx --no-build --verbosity normal --filter "Category!=Integration"

  terraform-plan-apply:
    permissions:
      id-token: write
      contents: read
    environment: stg
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    env: 
      ARM_USE_OIDC: true
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
        - name: Checkout Terraform files only
          uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
          with:
            fetch-depth: 1
            sparse-checkout: |
              src/terraform
            sparse-checkout-cone-mode: true
            persist-credentials: false

        - name: Token replace Terraform env vars
          env:
            ENVIRONMENT: ${{ vars.NAME_PREFIX }}
          run: |
            sed "s|__ENVIRONMENT__|${ENVIRONMENT}|g" \
              src/terraform/environment.tfvars \
              > src/terraform/environment.auto.tfvars

        - name: Azure Login
          uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
            enable-AzPSSession: true
        - name: Setup Terraform
          uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd 
          with:
            terraform_version: 1.9.8
        - name: Terraform Init
          run: |
           terraform -chdir=src/terraform init -input=false \
           -backend-config="resource_group_name=${VARS_TFSTATE_RESOURCE_GROUP}" \
           -backend-config="storage_account_name=${VARS_TFSTATE_STORAGE_ACCOUNT}" \
           -backend-config="container_name=${VARS_TFSTATE_CONTAINER}" \
           -backend-config="key=${VARS_TFSTATE_KEY}" \
           -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
           -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          env:
            VARS_TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP}}
            VARS_TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT}}
            VARS_TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER}}
            VARS_TFSTATE_KEY: ${{ vars.TFSTATE_KEY}}

        - name: Terraform Plan
          run: terraform -chdir=src/terraform plan -input=false

        - name: Terraform Apply
          run: terraform -chdir=src/terraform apply -input=false -auto-approve

        - name: Read Terraform outputs
          id: tf
          run: |
            echo "resource_group_name=$(terraform -chdir=src/terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
            echo "container_app_name=$(terraform -chdir=src/terraform output -raw container_app_name)" >> "$GITHUB_OUTPUT"
            echo "registry_url=$(terraform -chdir=src/terraform output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

  build-and-deploy-dotnet:
    runs-on: ubuntu-latest
    needs: 
      - test-dotnet
      - terraform-plan-apply
    permissions:
      id-token: write
      contents: read
    env:
      LOCATION_SHORT: uks
      APPLICATION: discordbot
      environment: stg
    steps:

      - name: Checkout Terraform files only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            Dockerfile
            src/dotnet
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Get commit info
        id: commit
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          COMMIT_MSG_SAFE="$(git log -1 --pretty=%s | tr -cs '[:alnum:]._+-' '-')"
          echo "msg_safe=${COMMIT_MSG_SAFE}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
          enable-AzPSSession: true

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703 # v2
        env:
          ENVIRONMENT: ${{ vars.NAME_PREFIX }}
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: ${{ format('{0}{1}{2}acr.azurecr.io', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          containerAppName: ${{ format('{0}-{1}-{2}-app', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          resourceGroup: ${{ format('{0}-{1}-{2}-rg', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          imageToBuild: ${{ format('{0}{1}{2}acr.azurecr.io/{2}:{3}', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION, github.sha) }}
          buildArguments: '"GIT_SHA=${{ steps.commit.outputs.sha }}" "GIT_COMMIT_MSG=${{ steps.commit.outputs.msg_safe }}"'
