name: Trigger auto deployment for uks-discordbot-capp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            terraform:
              - 'src/terraform/**'
            dotnet:
              - 'Dockerfile'
              - 'src/dotnet/**'

  test-dotnet:
    permissions:
      contents: read
    uses: ./.github/workflows/_dotnet-test.yml

  container-smoke:
    permissions:
      contents: read
    needs:
      - changes
      - test-dotnet
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.terraform == 'true'
    uses: ./.github/workflows/_container-smoke.yml
    with:
      git-sha: ${{ github.sha }}

  terraform-plan-apply:
    permissions:
      id-token: write
      contents: read
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    uses: ./.github/workflows/_terraform.yml
    with:
      apply: true
      github-environment: stg
      read-outputs: true

  build-and-deploy-dotnet:
    runs-on: ubuntu-latest
    needs: 
      - changes
      - test-dotnet
      - terraform-plan-apply
      - container-smoke
    if: >-
      ${{
        always() &&
        (needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.terraform == 'true') &&
        needs.test-dotnet.result == 'success' &&
        needs.container-smoke.result == 'success' &&
        (needs.terraform-plan-apply.result == 'success' || needs.terraform-plan-apply.result == 'skipped')
      }}
    permissions:
      id-token: write
      contents: read
    environment: stg
    env:
      LOCATION_SHORT: uks
      APPLICATION: discordbot
      ENVIRONMENT: ${{ vars.ENV_SHORT }}
    steps:

      - name: Checkout app files only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            Dockerfile
            src/dotnet
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Get commit info
        id: commit
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          COMMIT_MSG_SAFE="$(git log -1 --pretty=%s | tr -cs '[:alnum:]._+-' '-')"
          echo "msg_safe=${COMMIT_MSG_SAFE}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
          enable-AzPSSession: true

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703 # v2
        env:
          ENVIRONMENT: ${{ vars.ENV_SHORT }}
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: ${{ format('{0}{1}{2}acr.azurecr.io', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          containerAppName: ${{ format('{0}-{1}-{2}-app', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          resourceGroup: ${{ format('{0}-{1}-{2}-rg', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION) }}
          imageToBuild: ${{ format('{0}{1}{2}acr.azurecr.io/{2}:{3}', env.ENVIRONMENT, env.LOCATION_SHORT, env.APPLICATION, github.sha) }}
          buildArguments: '"GIT_SHA=${{ steps.commit.outputs.sha }}" "GIT_COMMIT_MSG=${{ steps.commit.outputs.msg_safe }}"'
