name: PR Validation

permissions: {}

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      github: ${{ steps.filter.outputs.github }}
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            terraform:
              - 'src/terraform/**'
            github:
              - '.github/**'
            dotnet:
              - 'Dockerfile'
              - '.github/workflows/_container-smoke.yml'
              - '.github/workflows/_dotnet-test.yml'
              - 'src/dotnet/**'


  zizmor-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.github == 'true'
    steps:
      - name: Sparse Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true
          persist-credentials: false
      
      - name: Zizmor Scan
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          advanced-security: false
          inputs:
            .github
          fail-on-no-inputs: true


  terraform-plan:
    permissions:
      id-token: write
      contents: read
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    uses: ./.github/workflows/_terraform.yml
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    with:
      github-environment: stg
            

  test-dotnet:
    permissions:
      contents: read
    uses: ./.github/workflows/_dotnet-test.yml

  container-smoke:
    permissions:
      contents: read
    needs:
      - changes
      - test-dotnet
    if: needs.changes.outputs.dotnet == 'true'
    uses: ./.github/workflows/_container-smoke.yml
    with:
      git-sha: ${{ github.sha }}
      
  status-check:
    if: ${{ always() }}
    needs: [test-dotnet, terraform-plan, zizmor-scan, container-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if required jobs failed
        run: |
          echo "dotnet=${{ needs.test-dotnet.result }}"
          echo "container-smoke=${{ needs.container-smoke.result }}"
          echo "terraform=${{ needs.terraform-plan.result }}"
          echo "zizmor=${{ needs.zizmor-scan.result }}"
          test "${{ needs.test-dotnet.result }}" = "success"
          test "${{ needs.container-smoke.result }}" = "success" -o "${{ needs.container-smoke.result }}" = "skipped"
          test "${{ needs.terraform-plan.result }}" = "success" -o "${{ needs.terraform-plan.result }}" = "skipped"
          test "${{ needs.zizmor-scan.result }}" = "success" -o "${{ needs.zizmor-scan.result }}" = "skipped"
